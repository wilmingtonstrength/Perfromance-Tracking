[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions.transcribe]
  # Whisper API can take a few seconds; bump the function timeout from the
  # default 10s to 26s (Netlify's max for a synchronous function).
  timeout = 26
