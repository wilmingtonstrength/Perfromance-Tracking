[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Transcription runs as a Background Function (transcribe-background) so it
# isn't held to the synchronous proxy's ~10s upstream HTTP timeout. The status
# endpoint (transcribe-status) is a fast plain function.
